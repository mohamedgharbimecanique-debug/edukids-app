<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CE2 - EDUKIDS 2.0</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Comic Sans MS', cursive; background: linear-gradient(135deg, #FF6B6B 0%, #FFE66D 100%); min-height: 100vh; padding: 10px; }
    .header { background: linear-gradient(135deg, #FF6B6B 0%, #FF8E72 100%); color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; box-shadow: 0 6px 12px rgba(0,0,0,0.2); }
    .score { background: #4ECDC4; color: #333; padding: 10px 20px; border-radius: 25px; display: inline-block; font-size: 20px; font-weight: bold; margin-bottom: 15px; border: 3px solid #fff; box-shadow: 0 3px 6px rgba(0,0,0,0.2); }
    .menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .menu-btn { background: linear-gradient(135deg, #FF6B6B, #FFE66D); color: #333; padding: 12px 30px; border: none; border-radius: 20px; font-size: 18px; cursor: pointer; transition: all 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.2); text-align: center; font-weight: bold; }
    .menu-btn:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
    .content { background: #FFF9E6; padding: 20px; border-radius: 15px; min-height: 400px; box-shadow: 0 6px 15px rgba(0,0,0,0.2); }
    .quiz-question { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 3px 8px rgba(0,0,0,0.1); }
    .quiz-option { background: #F0F4F8; margin: 8px 0; padding: 15px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: all 0.3s; font-size: 16px; }
    .quiz-option:hover { background: #E0E7FF; border-color: #FF6B6B; transform: translateX(5px); }
    .correct { background: #A8E6CF !important; border-color: #4CAF50 !important; }
    .incorrect { background: #FFB3B3 !important; border-color: #F44336 !important; }
    .lesson { background: white; padding: 20px; border-radius: 10px; margin: 15px 0; box-shadow: 0 3px 8px rgba(0,0,0,0.1); }
    .btn-primary { background: linear-gradient(135deg, #FF6B6B, #FFE66D); color: #333; padding: 15px 30px; border: none; border-radius: 20px; font-size: 18px; cursor: pointer; margin: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: all 0.3s; font-weight: bold; }
    .btn-primary:hover { transform: scale(1.05); box-shadow: 0 6px 15px rgba(0,0,0,0.3); }
    .badge { display: inline-block; padding: 5px 15px; margin: 5px; background: gold; border-radius: 20px; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
  </style>
</head>
<body>
  <div class="header">
    <h1>🚀 CE2 - EDUKIDS 2.0 🚀</h1>
    <div class="score">⭐ Score: <span id="score">0</span> points</div>
    <div class="badge" id="badgeDisplay"></div>
  </div>
  
  <div class="menu">
    <button class="menu-btn" onclick="showSection('maths')">🔢 Maths</button>
    <button class="menu-btn" onclick="showSection('francais')">📚 Français</button>
    <button class="menu-btn" onclick="showSection('sciences')">🔬 Sciences</button>
    <button class="menu-btn" onclick="location.href='index.html'">🏠 Accueil</button>
  </div>
  
  <div class="content" id="contentArea">
    <h2 style="text-align: center; color: #FF6B6B;">Bienvenue en CE2 ! 🎓</h2>
    <p style="text-align: center; margin-top: 20px; font-size: 18px;">Choisis une matière pour commencer à apprendre et t'amuser ! 🚀</p>
  </div>

  <script>
    let score = parseInt(localStorage.getItem('scoreCE2')) || 0;
    document.getElementById('score').textContent = score;
    
    const mathsQuestions = [
      { q: "Combien font 45 + 38 ?", options: ["80", "83", "85", "82"], correct: 1 },
      { q: "Combien font 9 × 8 ?", options: ["72", "70", "64", "81"], correct: 0 },
      { q: "Combien font 250 - 120 ?", options: ["130", "120", "140", "150"], correct: 0 },
      { q: "Quel est le quart de 100 ?", options: ["20", "25", "30", "40"], correct: 1 },
      { q: "Combien font 15 × 4 ?", options: ["60", "50", "70", "55"], correct: 0 }
    ];
    
    const francaisQuestions = [
      { q: "Quel est le pluriel de 'travail' ?", options: ["travails", "travaux", "travailss", "travaille"], correct: 1 },
      { q: "Comment écrit-on 'avoir' au passé composé ?", options: ["ai eu", "ai avoir", "aie eu", "ai eue"], correct: 0 },
      { q: "Quelle est la nature du mot 'rapidement' ?", options: ["nom", "verbe", "adverbe", "adjectif"], correct: 2 },
      { q: "Quel mot est bien écrit ?", options: ["occassion", "occasion", "ocassion", "occation"], correct: 1 },
      { q: "Quel est le féminin de 'professeur' ?", options: ["professeuse", "professeure", "professrice", "profetrice"], correct: 1 }
    ];
    
    const sciencesQuestions = [
      { q: "Quels sont les trois états de l'eau ?", options: ["solide, liquide, gazeux", "chaud, froid, tiède", "eau douce, eau salée, eau dure", "glace, pluie, neige"], correct: 0 },
      { q: "Combien de pattes a un insecte ?", options: ["4", "6", "8", "10"], correct: 1 },
      { q: "Lequel est un mammifère ?", options: ["serpent", "baleine", "mouche", "grenouille"], correct: 1 },
      { q: "De quoi les plantes ont-elles besoin pour vivre ?", options: ["eau et électricité", "eau, lumière et air", "eau et chaleur", "air et électricité"], correct: 1 },
      { q: "Quel gaz les plantes rejettent-elles ?", options: ["dioxyde de carbone", "oxygène", "azote", "hydrogène"], correct: 1 }
    ];
    
    function playSound(type) {
      const audio = new Audio();
      if (type === 'correct') {
        audio.src = 'data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSuBzvLZijkIG2i56+2jTwwOUKfj8LZjHAU5k9fzzHo';
      } else {
        audio.src = 'data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACGhYl/bF1fdJivrJBgNjZjodDbq2IcBj+a2/LDcSYGK4HO8tiKNggZaLvt559NEAxQp+PwtmMcBjiR1/LMeywFJXfH8N2RQAoUXrTp66hVFApGn+DyvmwhBSuBzvLZijkIG2i56+2jTwwOUKfj8LZjHAU5k9fzzHo';
      }
      audio.play().catch(() => {});
    }
    
    function updateScore(points) {
      score += points;
      localStorage.setItem('scoreCE2', score);
      document.getElementById('score').textContent = score;
      if (score >= 50) document.getElementById('badgeDisplay').textContent = '🏆 Expert CE2';
      else if (score >= 30) document.getElementById('badgeDisplay').textContent = '⭐ Champion';
      else if (score >= 15) document.getElementById('badgeDisplay').textContent = '🌟 Débutant';
    }
    
    function showSection(section) {
      const content = document.getElementById('contentArea');
      if (section === 'maths') {
        content.innerHTML = '<div class="lesson"><h2>📐 Leçon de Maths CE2</h2><p>En CE2, nous apprenons les opérations jusqu\'à 1000, les tables de multiplication complètes et la géométrie simple.</p></div>';
        content.innerHTML += '<h2 style="text-align:center; margin: 20px 0;">🧮 Quiz de Maths</h2>';
        showQuiz(mathsQuestions);
      } else if (section === 'francais') {
        content.innerHTML = '<div class="lesson"><h2>✍️ Leçon de Français CE2</h2><p>En CE2, nous apprenons le passé composé, les accords en genre et nombre, et l\'enrichissement du vocabulaire.</p></div>';
        content.innerHTML += '<h2 style="text-align:center; margin: 20px 0;">📖 Quiz de Français</h2>';
        showQuiz(francaisQuestions);
      } else if (section === 'sciences') {
        content.innerHTML = '<div class="lesson"><h2>🔬 Leçon de Sciences CE2</h2><p>En CE2, nous étudions les états de l\'eau, la classification des animaux et le fonctionnement des plantes.</p></div>';
        content.innerHTML += '<h2 style="text-align:center; margin: 20px 0;">🌍 Quiz de Sciences</h2>';
        showQuiz(sciencesQuestions);
      }
    }
    
    function showQuiz(questions) {
      const content = document.getElementById('contentArea');
      questions.forEach((q, index) => {
        let html = `<div class="quiz-question">
          <h3>Question ${index + 1}: ${q.q}</h3>`;
        q.options.forEach((opt, i) => {
          html += `<div class="quiz-option" onclick="checkAnswer(${index}, ${i}, ${q.correct}, this)">${opt}</div>`;
        });
        html += `</div>`;
        content.innerHTML += html;
      });
    }
    
    function checkAnswer(qIndex, selected, correct, element) {
      const allOptions = element.parentElement.querySelectorAll('.quiz-option');
      allOptions.forEach(opt => opt.style.pointerEvents = 'none');
      
      if (selected === correct) {
        element.classList.add('correct');
        playSound('correct');
        updateScore(2);
        setTimeout(() => speak('Bravo ! Bonne réponse !'), 100);
      } else {
        element.classList.add('incorrect');
        allOptions[correct].classList.add('correct');
        playSound('incorrect');
        setTimeout(() => speak('Essaie encore !'), 100);
      }
    }
    
    function speak(text) {
      if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'fr-FR';
        utterance.rate = 0.8;
        speechSynthesis.speak(utterance);
      }
    }
  </script>
</body>
</html>
