<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Background -->
  <rect width="800" height="600" fill="#f5f5f5"/>
  
  <!-- Title -->
  <text x="400" y="50" font-size="48" font-weight="bold" text-anchor="middle" fill="#333">Les Couleurs</text>
  <text x="400" y="100" font-size="24" text-anchor="middle" fill="#666">Apprendre les couleurs</text>
  
  <!-- Red circle -->
  <g>
    <circle cx="100" cy="200" r="50" fill="#FF0000"/>
    <text x="100" y="280" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">Rouge</text>
  </g>
  
  <!-- Blue circle -->
  <g>
    <circle cx="200" cy="200" r="50" fill="#0000FF"/>
    <text x="200" y="280" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">Bleu</text>
  </g>
  
  <!-- Yellow circle -->
  <g>
    <circle cx="300" cy="200" r="50" fill="#FFFF00"/>
    <text x="300" y="280" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">Jaune</text>
  </g>
  
  <!-- Green circle -->
  <g>
    <circle cx="400" cy="200" r="50" fill="#00AA00"/>
    <text x="400" y="280" font-size="20" font-weight="bold" text-anchor="middle" fill="white">Vert</text>
  </g>
  
  <!-- Orange circle -->
  <g>
    <circle cx="500" cy="200" r="50" fill="#FFA500"/>
    <text x="500" y="280" font-size="20" font-weight="bold" text-anchor="middle" fill="white">Orange</text>
  </g>
  
  <!-- Purple circle -->
  <g>
    <circle cx="600" cy="200" r="50" fill="#800080"/>
    <text x="600" y="280" font-size="20" font-weight="bold" text-anchor="middle" fill="white">Violet</text>
  </g>
  
  <!-- Pink circle -->
  <g>
    <circle cx="700" cy="200" r="50" fill="#FF69B4"/>
    <text x="700" y="280" font-size="20" font-weight="bold" text-anchor="middle" fill="white">Rose</text>
  </g>
  
  <!-- Black circle -->
  <g>
    <circle cx="150" cy="400" r="50" fill="#000000"/>
    <text x="150" y="480" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">Noir</text>
  </g>
  
  <!-- White circle (with border) -->
  <g>
    <circle cx="250" cy="400" r="50" fill="#FFFFFF" stroke="#333" stroke-width="2"/>
    <text x="250" y="480" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">Blanc</text>
  </g>
  
  <!-- Gray circle -->
  <g>
    <circle cx="350" cy="400" r="50" fill="#808080"/>
    <text x="350" y="480" font-size="20" font-weight="bold" text-anchor="middle" fill="white">Gris</text>
  </g>
  
  <!-- Brown circle -->
  <g>
    <circle cx="450" cy="400" r="50" fill="#8B4513"/>
    <text x="450" y="480" font-size="20" font-weight="bold" text-anchor="middle" fill="white">Marron</text>
  </g>
  
  <!-- Cyan circle -->
  <g>
    <circle cx="550" cy="400" r="50" fill="#00FFFF"/>
    <text x="550" y="480" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">Cyan</text>
  </g>
  
  <!-- Encouraging text -->
  <text x="400" y="570" font-size="18" text-anchor="middle" fill="#666">Reconnais les couleurs autour de toi!</text>
</svg>
